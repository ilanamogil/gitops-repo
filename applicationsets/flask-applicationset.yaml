apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: flask-applicationset
  namespace: argocd
spec:
  generators:
    # Git generator: one Application per environment directory under
    # flask-aws-monitor/ (dev, qa, prd)
    - git:
        repoURL: https://github.com/ilanamogil/gitops-repo.git
        revision: main
        directories:
          - path: flask-aws-monitor/*
  template:
    metadata:
      name: 'flask-{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/ilanamogil/gitops-repo.git
        targetRevision: main
        path: charts/flask-aws-monitor
        helm:
          # Values file lives in flask-aws-monitor/<envname>/values.yaml
          # (repo root), referenced relative to the chart path.
          valueFiles:
            - ../../flask-aws-monitor/{{path.basename}}/values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
