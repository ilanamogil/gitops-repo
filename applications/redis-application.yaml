apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ilanamogil/gitops-repo.git
    targetRevision: main
    path: charts/redis
    # Uses the chart's default values. To run Redis per-environment,
    # mirror the stress-app/flask-aws-monitor pattern with an ApplicationSet.
  destination:
    server: https://kubernetes.default.svc
    namespace: redis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
